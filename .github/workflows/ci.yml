name: C++ CI

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
  pull_request:
    branches:
      - main

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev libgtest-dev lcov

      - name: Create data directory
        run: mkdir -p data

      - name: Configure project with coverage
        run: cmake -S . -B build -DENABLE_COVERAGE=ON

      - name: Build project
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.full.info --ignore-errors mismatch

          lcov --extract coverage.full.info \
            '*/src/auth.cpp' \
            '*/src/database.cpp' \
            '*/src/trip_service.cpp' \
            '*/src/report_service.cpp' \
            '*/src/bus_service.cpp' \
            '*/src/route_service.cpp' \
            --output-file coverage.info \
            --ignore-errors mismatch

          genhtml coverage.info \
            --output-directory coverage_html \
            --ignore-errors mismatch

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html

      - name: Upload lcov info
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info
